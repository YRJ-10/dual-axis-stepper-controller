<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dual Axis Stepper Tuner</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Serial controls">
        <div>
          <h1>Dual Axis Stepper Tuner</h1>
          <p id="connectionStatus">Belum terhubung</p>
        </div>
        <div class="active-display" aria-label="Active mode display">
          <span>Mode Aktif Sekarang</span>
          <strong id="currentActiveMode">-</strong>
        </div>
        <div class="actions">
          <button id="connectButton" type="button">Connect</button>
          <button id="disconnectButton" type="button" disabled>Disconnect</button>
        </div>
      </section>

      <section class="control-strip" aria-label="Mode controls">
        <label>
          Mode Aktif
          <select id="activeModeSelect"></select>
        </label>
        <button id="setModeButton" type="button" disabled>Set Mode</button>
        <button id="readButton" type="button" disabled>Read Arduino</button>
        <button id="saveButton" type="button" disabled>Save EEPROM</button>
        <button id="loadButton" type="button" disabled>Load EEPROM</button>
        <div id="commandStatus" class="command-status" role="status">Siap</div>
      </section>

      <section id="speedPanel" class="speed-panel" aria-label="Speed control" tabindex="0">
        <div class="speed-readout">
          <span>Speed</span>
          <strong id="speedValue">0</strong>
          <small id="speedSource">Potensio</small>
        </div>
        <input id="speedSlider" type="range" min="0" max="100" step="1" value="0">
        <div class="speed-actions">
          <button id="speedDownButton" type="button">-</button>
          <button id="setSpeedButton" type="button">Set Speed</button>
          <button id="speedUpButton" type="button">+</button>
          <button id="stopButton" type="button">STOP</button>
          <button id="potButton" type="button">Potensio</button>
        </div>
      </section>

      <section class="table-wrap" aria-label="Mode table">
        <table>
          <thead>
            <tr>
              <th>Mode</th>
              <th>Step Motor 1</th>
              <th>Step Motor 2</th>
              <th>Motor 2 x</th>
              <th>Easing M1</th>
              <th>Easing M2</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="modeTableBody"></tbody>
        </table>
      </section>

      <section class="log-panel" aria-label="Serial log">
        <div class="log-header">
          <h2>Log</h2>
          <button id="clearLogButton" type="button">Clear</button>
        </div>
        <pre id="logOutput"></pre>
      </section>
    </main>

    <script src="./app.js?v=20260715-easing2b"></script>
  </body>
</html>
